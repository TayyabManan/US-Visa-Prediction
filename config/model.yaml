grid_search:
  class: GridSearchCV
  module: sklearn.model_selection
  params:
    cv: 5
    verbose: 1
    scoring: f1
model_selection:
  module_0:
    class: RandomForestClassifier
    module: sklearn.ensemble
    params:
      n_estimators: 200
      max_depth: 15
      max_features: sqrt
      random_state: 42
      n_jobs: -1
    search_param_grid:
      n_estimators:
      - 100
      - 200
      - 300
      max_depth:
      - 10
      - 20
      - 30
      max_features:
      - sqrt
      - log2
  module_1:
    class: GradientBoostingClassifier
    module: sklearn.ensemble
    params:
      n_estimators: 200
      learning_rate: 0.1
      max_depth: 5
      random_state: 42
    search_param_grid:
      n_estimators:
      - 100
      - 200
      - 300
      learning_rate:
      - 0.05
      - 0.1
      - 0.2
      max_depth:
      - 3
      - 5
      - 7
  module_2:
    class: XGBClassifier
    module: xgboost
    params:
      n_estimators: 200
      learning_rate: 0.1
      max_depth: 5
      random_state: 42
      eval_metric: logloss
      use_label_encoder: false
    search_param_grid:
      n_estimators:
      - 100
      - 200
      - 300
      learning_rate:
      - 0.05
      - 0.1
      - 0.2
      max_depth:
      - 3
      - 5
      - 7
